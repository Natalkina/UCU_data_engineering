version: "3.9"

services:
  mongo1:
    image: mongo:7.0
    container_name: mongo1
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all"]
    ports:
      - "27017:27017"

  mongo2:
    image: mongo:7.0
    container_name: mongo2
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all"]
    ports:
      - "27018:27017"

  mongo3:
    image: mongo:7.0
    container_name: mongo3
    command: ["mongod", "--replSet", "myReplicaSet", "--bind_ip_all"]
    ports:
      - "27019:27017"